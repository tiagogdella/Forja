<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hackeando seu treino">
  <title>Treino - Hackeando seu Treino</title>
  <link rel="icon" type="image/png" href="IMG/logoMenor.png">
  <link rel="apple-touch-icon" href="IMG/apple-touch-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">

  <!-- [VUE 1] Importa Vue 3 pelo CDN — sem instalação, sem build tool -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <nav class="navbar navbar-dark">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand fw-bold" href="index.html">&lt; voltar</a>
      <span class="fw-bold terminal-command" id="treinoNome"></span>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger terminal-command">
        logout
      </button>
    </div>
  </nav>

  <div class="container my-4">
    <!--
      [VUE 2] Ponto de montagem do app Vue.
      Tudo dentro desta div é controlado pelo Vue — ele vai substituir
      o conteúdo estático pelo template reativo definido no JS abaixo.
    -->
    <div id="exercicios"></div>

    <button class="btn btn-success mt-4 terminal-command" id="btnFinalizar">finalizar_treino</button>
  </div>

  <script src="JSFiles/terminal.js"></script>
  <script src="JSFiles/config.js"></script>
  <script src="JSFiles/auth.js"></script>
  <script>
    // =========================================================
    // [VUE 3] createApp — cria o app Vue com:
    //   data()    → estado reativo (as "variáveis" da tela)
    //   watch     → observa mudanças nos dados e reage
    //   methods   → funções disponíveis no template e no JS externo
    //   template  → o HTML que Vue vai renderizar dentro de #exercicios
    // =========================================================
    const vueApp = Vue.createApp({

      // ---------------------------------------------------------
      // [VUE 4] data() — o coração do Vue.
      // Cada propriedade aqui é REATIVA: quando você muda um valor,
      // Vue atualiza a tela automaticamente. Sem getElementById,
      // sem innerHTML. Você só muda os dados.
      // ---------------------------------------------------------
      data() {
        return {
          treino: null,
          ultimoTreino: null,

          // Um objeto por exercício:
          // { numSeries: 3, series: [{peso: '80', reps: '15'}, ...] }
          exerciciosState: []
        }
      },

      // ---------------------------------------------------------
      // [VUE 5] watch — observa uma propriedade e executa código
      // quando ela (ou algo dentro dela) muda.
      // deep: true → rastreia mudanças em objetos/arrays aninhados.
      // Aqui usamos para auto-salvar sempre que qualquer input mudar,
      // sem precisar colocar oninput em cada campo manualmente.
      // ---------------------------------------------------------
      watch: {
        exerciciosState: {
          deep: true,
          handler() {
            salvarEstadoLocal();
          }
        }
      },

      methods: {
        // Chamado pelo JS externo após buscar treino + ultimoTreino da API
        inicializar(treino, ultimoTreino) {
          this.treino = treino;
          this.ultimoTreino = ultimoTreino;

          // Constrói o estado inicial para cada exercício
          this.exerciciosState = treino.exercicios.map(ex => {
            let dadosUltimo = null;
            if (ultimoTreino.existe) {
              dadosUltimo = ultimoTreino.series_por_exercicio.find(s => s.exercicio_id === ex.id);
            }

            const numSeries = dadosUltimo ? dadosUltimo.series.length : 3;

            const series = Array.from({ length: numSeries }, (_, s) => ({
              peso: dadosUltimo?.series[s] ? String(dadosUltimo.series[s].peso) : '',
              reps: dadosUltimo?.series[s] ? String(dadosUltimo.series[s].repeticoes) : ''
            }));

            return { numSeries, series };
          });
        },

        // Sincroniza o array de series quando numSeries muda
        ajustarSeries(i) {
          const exState = this.exerciciosState[i];
          const ex = this.treino.exercicios[i];

          let dadosUltimo = null;
          if (this.ultimoTreino.existe) {
            dadosUltimo = this.ultimoTreino.series_por_exercicio.find(s => s.exercicio_id === ex.id);
          }

          const target = exState.numSeries;
          const atual = exState.series.length;

          if (target > atual) {
            // Adiciona séries novas (Vue 3 detecta push reativamente)
            for (let s = atual; s < target; s++) {
              exState.series.push({
                peso: dadosUltimo?.series[s] ? String(dadosUltimo.series[s].peso) : '',
                reps: dadosUltimo?.series[s] ? String(dadosUltimo.series[s].repeticoes) : ''
              });
            }
          } else {
            // Remove séries excedentes (splice também é reativo)
            exState.series.splice(target);
          }
        },

        // ---------------------------------------------------------
        // [VUE 6] Métodos auxiliares usados no template com {{ }} e :attr
        // ---------------------------------------------------------
        emojiTipo(i) {
          return this.treino.exercicios[i].tipo === 'isometrico' ? '⏱️' : '🏋️';
        },

        labelUnidade(i) {
          return this.treino.exercicios[i].tipo === 'isometrico' ? 'Segundos' : 'Repetições';
        },

        placeholderPeso(i, s) {
          const ex = this.treino.exercicios[i];
          if (this.ultimoTreino.existe) {
            const d = this.ultimoTreino.series_por_exercicio.find(d => d.exercicio_id === ex.id);
            if (d?.series[s]) return String(d.series[s].peso);
          }
          return '80';
        },

        placeholderReps(i, s) {
          const ex = this.treino.exercicios[i];
          if (this.ultimoTreino.existe) {
            const d = this.ultimoTreino.series_por_exercicio.find(d => d.exercicio_id === ex.id);
            if (d?.series[s]) return String(d.series[s].repeticoes);
          }
          return ex.tipo === 'isometrico' ? '30' : '10';
        },

        // ---------------------------------------------------------
        // [VUE 7] A feature nova: média de reps por exercício.
        // Calcula em tempo real a partir do estado reativo —
        // sem tocar no DOM, sem getElementById.
        // ---------------------------------------------------------
        mediaReps(i) {
          const preenchidas = this.exerciciosState[i].series.filter(s => s.reps !== '' && Number(s.reps) > 0);
          if (preenchidas.length === 0) return null;
          const soma = preenchidas.reduce((acc, s) => acc + Number(s.reps), 0);
          return (soma / preenchidas.length).toFixed(1);
        },

        // Exporta estado para o JS externo (salvar e finalizar)
        getEstado() {
          return this.exerciciosState.map(ex => ({
            numSeries: ex.numSeries,
            series: ex.series.map(s => ({ peso: s.peso, reps: s.reps }))
          }));
        },

        // Restaura estado salvo no localStorage
        restaurarEstado(estado) {
          if (!estado.exercicios || estado.exercicios.length !== this.exerciciosState.length) return;
          estado.exercicios.forEach((exDados, i) => {
            if (!exDados) return;
            this.exerciciosState[i].numSeries = exDados.numSeries;
            this.exerciciosState[i].series = exDados.series.map(s => ({ peso: s.peso, reps: s.reps }));
          });
          window.Terminal.showLog('Treino restaurado — continue de onde parou!', 'info');
        }
      },

      // ---------------------------------------------------------
      // [VUE 8] template — o HTML reativo do app.
      //
      // Diretivas principais usadas aqui:
      //   v-for       → loop (substitui forEach + innerHTML)
      //   v-model     → two-way binding: input ↔ dado (lê E escreve)
      //   v-model.number → converte para número automaticamente
      //   v-if        → renderiza só se condição for true
      //   :attr       → bind dinâmico de atributo (: é atalho de v-bind)
      //   @event      → listener de evento (@ é atalho de v-on)
      //   {{ expr }}  → interpolação: exibe valor do dado/método
      // ---------------------------------------------------------
      template: `
        <div
          v-for="(exState, i) in exerciciosState"
          :key="i"
          class="card p-3 mb-3 shadow-sm"
        >
          <h5 class="mb-3">{{ emojiTipo(i) }} {{ treino.exercicios[i].nome }}</h5>

          <div class="mb-2">
            <label class="form-label fw-semibold terminal-prompt">Número de séries</label>
            <!--
              v-model.number → two-way binding com conversão automática para número.
              @change        → chama ajustarSeries quando o valor muda.
            -->
            <input
              type="number"
              v-model.number="exState.numSeries"
              @change="ajustarSeries(i)"
              class="form-control"
              min="1"
              max="15">
          </div>

          <!--
            v-for aninhado → itera as séries de cada exercício.
            :key="s" → identificador único para o Vue rastrear cada item.
          -->
          <div
            v-for="(serie, s) in exState.series"
            :key="s"
            class="row mb-2"
          >
            <div class="col">
              <label class="form-label terminal-prompt">S{{ s + 1 }} Peso (kg)</label>
              <!--
                v-model → conecta diretamente este input à propriedade
                serie.peso no estado. Qualquer digitação atualiza o dado,
                qualquer mudança no dado atualiza o input.
                :placeholder → valor dinâmico via método.
              -->
              <input
                type="number"
                v-model="serie.peso"
                min="0"
                step="0.5"
                class="form-control"
                :placeholder="placeholderPeso(i, s)">
            </div>
            <div class="col">
              <label class="form-label terminal-prompt">{{ labelUnidade(i) }}</label>
              <input
                type="number"
                v-model="serie.reps"
                min="1"
                class="form-control"
                :placeholder="placeholderReps(i, s)">
            </div>
          </div>

          <!--
            v-if → só aparece quando há reps preenchidas.
            mediaReps(i) recalcula automaticamente a cada digitação
            porque lê exerciciosState, que é reativo.
          -->
          <div v-if="mediaReps(i) !== null" class="mt-2 small terminal-prompt">
            Média de {{ labelUnidade(i).toLowerCase() }}:
            <strong>{{ mediaReps(i) }}</strong>
          </div>
        </div>
      `

    // [VUE 9] mount('#exercicios') — conecta o app ao elemento do HTML.
    // A partir daqui Vue controla tudo dentro de #exercicios.
    }).mount('#exercicios');


    // =========================================================
    // JS externo — cuida de API, auth, localStorage.
    // Lê/escreve estado via vueApp ao invés de getElementById.
    // =========================================================

    let treinoId = null;
    let execucaoId = null;
    let treino = null;
    let ultimoTreino = null;

    function salvarEstadoLocal() {
      if (!treino || !treinoId || !execucaoId) return;
      const estado = {
        execucaoId,
        timestamp: Date.now(),
        // Lê estado do Vue em vez de varrer o DOM com getElementById
        exercicios: vueApp.getEstado()
      };
      localStorage.setItem(`treino_estado_${treinoId}`, JSON.stringify(estado));
    }

    function restaurarEstadoLocal(estado) {
      // Delega ao Vue — ele atualiza os dados, tela reflete sozinha
      vueApp.restaurarEstado(estado);
    }

    function iniciarKeepalive() {
      setInterval(async () => {
        try {
          const res = await apiFetch('/api/auth/status');
          const dados = await res.json();
          if (!dados.autenticado) {
            window.Terminal.showError('Sessão expirada. Redirecionando...');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
          }
        } catch (e) { /* ignora erro de rede */ }
      }, 8 * 60 * 1000);

      setInterval(salvarEstadoLocal, 30 * 1000);
    }

    window.addEventListener('beforeunload', salvarEstadoLocal);

    async function iniciarTreino() {
      treinoId = localStorage.getItem("treinoSelecionado");

      if (!treinoId) {
        window.Terminal.showError("Erro: Nenhum treino selecionado");
        setTimeout(() => { window.location.href = "index.html"; }, 2000);
        return;
      }

      let estadoSalvo = null;
      const estadoStr = localStorage.getItem(`treino_estado_${treinoId}`);
      if (estadoStr) {
        try {
          const parsed = JSON.parse(estadoStr);
          if (Date.now() - parsed.timestamp < 6 * 60 * 60 * 1000) {
            estadoSalvo = parsed;
          } else {
            localStorage.removeItem(`treino_estado_${treinoId}`);
          }
        } catch (e) {
          localStorage.removeItem(`treino_estado_${treinoId}`);
        }
      }

      try {
        const resposta = await apiFetch(`/api/treinos/${treinoId}`);
        treino = await resposta.json();

        document.getElementById("treinoNome").textContent = treino.nome;

        const resUltimo = await apiFetch(`/api/treinos/${treinoId}/ultimo`);
        ultimoTreino = await resUltimo.json();

        if (estadoSalvo?.execucaoId) {
          try {
            const resExec = await apiFetch(`/api/execucoes/${estadoSalvo.execucaoId}`);
            if (resExec.ok) {
              const dadosExec = await resExec.json();
              if (dadosExec.volume_total == null) execucaoId = estadoSalvo.execucaoId;
            }
          } catch (e) { /* cria nova abaixo */ }
        }

        if (!execucaoId) {
          const resExec = await apiFetch(`/api/treinos/${treinoId}/executar`, { method: "POST" });
          const dadosExec = await resExec.json();
          execucaoId = dadosExec.execucao_id;
        }

        // Passa os dados para o Vue — ele renderiza tudo
        vueApp.inicializar(treino, ultimoTreino);

        if (estadoSalvo) restaurarEstadoLocal(estadoSalvo);

        iniciarKeepalive();

      } catch (erro) {
        window.Terminal.showError("Erro ao carregar treino: " + erro.message);
        setTimeout(() => { window.location.href = "index.html"; }, 2000);
      }
    }

    async function finalizarTreino() {
      if (!execucaoId) {
        window.Terminal.showError("Erro: Execução não foi iniciada");
        return;
      }

      const btnFinalizar = document.getElementById("btnFinalizar");
      btnFinalizar.disabled = true;
      btnFinalizar.textContent = "$ salvando...";

      try {
        // Lê estado do Vue (sem tocar no DOM)
        const estadoAtual = vueApp.getEstado();
        let ordemGlobal = 1;

        for (let i = 0; i < treino.exercicios.length; i++) {
          const exercicio = treino.exercicios[i];
          const { numSeries, series } = estadoAtual[i];

          for (let s = 0; s < numSeries; s++) {
            const { peso, reps } = series[s];

            if (!peso || !reps) {
              const unidade = exercicio.tipo === 'isometrico' ? 'segundos' : 'reps';
              window.Terminal.showError(`Preencha peso e ${unidade} da série ${s + 1} do exercício ${exercicio.nome}`);
              btnFinalizar.disabled = false;
              btnFinalizar.textContent = "finalizar_treino";
              return;
            }

            await apiFetch(`/api/execucoes/${execucaoId}/series`, {
              method: "POST",
              body: JSON.stringify({
                exercicio_id: exercicio.id,
                peso: parseFloat(peso),
                repeticoes: parseInt(reps),
                ordem: ordemGlobal
              })
            });

            ordemGlobal++;
          }
        }

        const resFinal = await apiFetch(`/api/execucoes/${execucaoId}/finalizar`, { method: "POST" });
        const resultado = await resFinal.json();

        const resProgressao = await apiFetch(`/api/treinos/${treinoId}/progressao`);
        const progressao = await resProgressao.json();

        let mensagem = `Treino finalizado! Volume: ${resultado.volume_total.toFixed(2)}kg`;
        if (progressao.progresso_percentual !== null) {
          const sinal = progressao.progresso_percentual >= 0 ? "+" : "";
          mensagem += ` | Progressão: ${sinal}${progressao.progresso_percentual.toFixed(2)}%`;
        }

        localStorage.removeItem(`treino_estado_${treinoId}`);
        window.Terminal.showSuccess(mensagem);

        if (progressao.delta_reps_por_exercicio?.length > 0) {
          progressao.delta_reps_por_exercicio.forEach(item => {
            const ex = treino.exercicios.find(e => e.nome === item.exercicio_nome);
            const unidade = ex?.tipo === 'isometrico' ? 'seg' : 'reps';
            const sinal = item.delta_reps > 0 ? '+' : '';
            const tipo = item.delta_reps >= 0 ? 'success' : 'info';
            setTimeout(() => {
              window.Terminal.showLog(`${item.exercicio_nome}: ${sinal}${item.delta_reps} ${unidade}`, tipo);
            }, 500);
          });
        }

        setTimeout(() => { window.location.href = "index.html"; }, 3000);

      } catch (erro) {
        window.Terminal.showError("Erro ao finalizar treino: " + erro.message);
        btnFinalizar.disabled = false;
        btnFinalizar.textContent = "finalizar_treino";
      }
    }

    document.getElementById("btnFinalizar").addEventListener("click", finalizarTreino);
    iniciarTreino();
  </script>
</body>
</html>
